name: Build DuckFlix TV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Prepare artifact
        run: cp app/build/outputs/apk/release/app-release.apk duckflix-tv.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckflix-tv-apk
          path: duckflix-tv.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: DuckFlix TV v1.0.${{ github.run_number }}
          files: duckflix-tv.apk
          make_latest: true
