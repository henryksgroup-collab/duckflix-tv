plugins {
    id 'com.android.application'
}

android {
    namespace 'com.duckflix.tv'
    compileSdk 34

    defaultConfig {
        applicationId 'com.duckflix.tv'
        minSdk 21          // Fire OS 5 (Fire TV Stick 2017) em diante
        targetSdk 34
        versionCode 4
        versionName '1.3'
    }

    buildTypes {
        release {
            minifyEnabled false
            // assina com a chave debug → instala via sideload (Downloader/NTDown) sem keystore
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
